spring:
  application:
    name: document-pipeline-api
  main:
    banner-mode: off
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pipeline}
    username: ${SPRING_DATASOURCE_USERNAME:pipeline}
    password: ${SPRING_DATASOURCE_PASSWORD:pipeline}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

server:
  port: ${PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  queue:
    dispatch-mode: ${APP_QUEUE_DISPATCH_MODE:noop}
  worker:
    url: ${APP_WORKER_URL:http://localhost:8000/internal/tasks/analyze}
  callback:
    url: ${APP_CALLBACK_URL:http://localhost:8082/internal/jobs/callbacks}
  internal:
    shared-secret: ${APP_INTERNAL_SHARED_SECRET:}
  storage:
    root-dir: ${APP_STORAGE_ROOT_DIR:.local-storage}
